[input]
csv_path = "data/raw/上市公司专利明细_2021年申请.csv"
encoding = "utf-8-sig"

[output]
routes_dir = "data/interim/2021"
csv_path = "data/processed/patent_classifications_2021.csv"

[llm]
model = "${LLM_MODEL}"
temperature = 0

[classification]
labels = [1, 2, 3]
prompt_version = "data-security-three-class-v1.0.0"
e_both_docs_rate = 0.002
e_one_doc_rate = 0.004
e_no_docs_rate = 0.0005
